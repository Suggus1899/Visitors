name: CI

# Continuous Integration for the LogMaster monorepo.
# Runs on every pull request and on pushes to main / develop.
#
# Turbo Remote Cache (optional, recommended):
#   To enable Vercel Remote Cache, set these repository secrets:
#     TURBO_TOKEN  -> your Vercel access token
#     TURBO_TEAM   -> your Vercel team slug
#   Then uncomment the `env:` block in the setup job and every job that
#   needs remote cache. See https://turbo.build/repo/docs/core/features/remote-caching

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '11.3.0'
  # TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  # TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  setup:
    name: Setup & Install
    runs-on: ubuntu-latest
    outputs:
      pkg-matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Debug pnpm
        run: |
          echo "PATH: $PATH"
          which pnpm || echo "pnpm NOT FOUND"
          pnpm --version || echo "pnpm --version FAILED"
          node --version
          npm --version
          echo "--- ls -la ---"
          ls -la
          echo "--- pnpm-workspace.yaml ---"
          cat pnpm-workspace.yaml || echo "NO pnpm-workspace.yaml"
          echo "--- .npmrc ---"
          cat .npmrc || echo "NO .npmrc"

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: pnpm install 2>&1 | tee install.log

      - name: Show install result
        run: |
          echo "Install outcome: ${{ steps.install.outcome }}"
          echo "--- install.log ---"
          cat install.log || echo "No install.log"

      - name: Upload install log
        uses: actions/upload-artifact@v4
        with:
          name: install-log
          path: install.log
          if-no-files-found: ignore

      - name: Fail if install failed
        if: steps.install.outcome == 'failure'
        run: exit 1

      - name: Build package matrix
        id: matrix
        run: |
          # Build a matrix of all workspace packages (apps + shared packages + server).
          packages=$(find apps packages server -maxdepth 1 -name package.json -printf '%h\n' 2>/dev/null | sort -u)
          matrix=$(jq -nc --args '$ARGS.positional' --args $packages)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint (${{ matrix.package }})
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        package: ${{ fromJson(needs.setup.outputs.pkg-matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-lint-${{ matrix.package }}-${{ github.sha }}
          restore-keys: |
            turbo-lint-${{ matrix.package }}-
            turbo-lint-

      - name: Lint (turbo filter)
        run: pnpm turbo run lint --filter=${{ matrix.package }}

  typecheck:
    name: Typecheck (${{ matrix.package }})
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        package: ${{ fromJson(needs.setup.outputs.pkg-matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-typecheck-${{ matrix.package }}-${{ github.sha }}
          restore-keys: |
            turbo-typecheck-${{ matrix.package }}-
            turbo-typecheck-

      - name: Typecheck
        run: |
          pkg="${{ matrix.package }}"
          if jq -e '.scripts.typecheck' "${pkg}/package.json" >/dev/null 2>&1; then
            pnpm --dir "${pkg}" run typecheck
          else
            pnpm --dir "${pkg}" exec tsc --noEmit
          fi

  build:
    name: Build (${{ matrix.package }})
    needs: [setup, lint, typecheck]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        package: ${{ fromJson(needs.setup.outputs.pkg-matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-build-${{ matrix.package }}-${{ github.sha }}
          restore-keys: |
            turbo-build-${{ matrix.package }}-
            turbo-build-

      - name: Build (turbo filter)
        run: pnpm turbo run build --filter=${{ matrix.package }}

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.package }}-${{ github.sha }}
          path: |
            ${{ matrix.package }}/dist
            ${{ matrix.package }}/build
            ${{ matrix.package }}/.next
          if-no-files-found: ignore
          retention-days: 7

  test:
    name: Test (${{ matrix.package }})
    needs: [setup, build]
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.setup.outputs.pkg-matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-test-${{ matrix.package }}-${{ github.sha }}
          restore-keys: |
            turbo-test-${{ matrix.package }}-
            turbo-test-

      - name: Run tests (only if test script exists)
        run: |
          pkg="${{ matrix.package }}"
          if jq -e '.scripts.test' "${pkg}/package.json" >/dev/null 2>&1; then
            pnpm turbo run test --filter="${pkg}"
          else
            echo "No test script in ${pkg}, skipping."
          fi
