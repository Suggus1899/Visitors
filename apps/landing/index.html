<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Primary Meta Tags -->
    <title>LogMaster — Visitor Management Software for Modern Organizations</title>
    <meta name="title" content="LogMaster — Visitor Management Software" />

    <meta name="author" content="LogMaster" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
